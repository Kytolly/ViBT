project:
  name: "ViBT-Style1000"
  root: "/opt/liblibai-models/user-workspace2/users/xqy/project/ViBT"
  output_dir: "outputs/stylization-v2"
  logging_dir: "logs"

model:
  path: "/opt/liblibai-models/user-workspace2/model_zoo/Wan2.1-T2V-1.3B-Diffusers"
  use_lora: false
  lora_rank: 128
  lora_alpha: 128

dataset:
  repo_id: ""
  root: "/opt/liblibai-models/user-workspace2/datasets/style1000_aligned"
  index: "index_for_train.json"
  phase: ""         
  clip_len: 29
  stride: 4            
  height: 480  
  width: 832
  batch_size: 1                                      
  serial_batches: True                             
  num_workers: 32

train:
  optimizer: "prodigy" 
  lr: 1.0
  weight_decay: 0.01
  decouple: true
  use_bias_correction: true
  safeguard_warmup: true
  d_coef: 1.0
  epochs: 25
  smooth_loss_factor: 0.9
  gradient_accumulation_steps: 1
  save_interval: 1000  # steps
  log_interval: 10     # steps
  mixed_precision: "bf16"
  gradient_checkpointing: false
  instruction: ""
  resume_path: "outputs/stylization-v2/checkpoint_step_15000"

inference:
  num_inference_steps: 28
  noise_scale: 1.0
  shift_gamma: 5.0
  seed: 42